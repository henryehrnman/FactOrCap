<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=400, initial-scale=1.0" />
    <title>FactOrCap</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1 class="logo">Fact<span class="logo-accent">Or</span>Cap</h1>
        <p class="tagline">AI-powered fact checker</p>
      </header>

      <!-- Idle State — shown before scanning -->
      <section id="state-idle" class="state">
        <div class="idle-illustration">
          <div class="magnifier">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <p class="idle-text">Scan this page to find claims<br/>and check them against the facts.</p>
        </div>
        <button id="btn-scan" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Scan Page
        </button>
      </section>

      <!-- Scanning State — shown while extracting + checking -->
      <section id="state-scanning" class="state hidden">
        <div class="scanning-animation">
          <div class="pulse-ring"></div>
          <div class="pulse-ring delay"></div>
          <div class="pulse-dot"></div>
        </div>
        <p class="scanning-label">Analyzing page&hellip;</p>
        <p class="scanning-sub" id="scanning-status">Extracting claims from the page</p>
      </section>

      <!-- Results State — shows claim cards -->
      <section id="state-results" class="state hidden">
        <div class="results-summary" id="results-summary"></div>
        <ul class="claims-list" id="claims-list"></ul>
        <button id="btn-rescan" class="btn-secondary">Scan Again</button>
      </section>

      <!-- Empty State — no claims found -->
      <section id="state-empty" class="state hidden">
        <div class="empty-illustration">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p>No checkable claims found on this page.</p>
        </div>
        <button id="btn-rescan-empty" class="btn-secondary">Try Again</button>
      </section>

      <!-- Error State -->
      <section id="state-error" class="state hidden">
        <div class="error-illustration">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <p id="error-message">Something went wrong. Please try again.</p>
        </div>
        <button id="btn-retry" class="btn-secondary">Retry</button>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <span class="footer-text">FactOrCap v1.0</span>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>

name: Build extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Bundle FactOrCap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inject API key into config.js
        env:
          API_KEY: ${{ secrets.GOOGLE_FACT_CHECK_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::Repository secret GOOGLE_FACT_CHECK_API_KEY is not set."
            echo "Add it under Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          # awk so any character in the API key is treated literally,
          # including ones that would be special to sed.
          awk -v key="$API_KEY" '{ gsub(/__GOOGLE_FACT_CHECK_API_KEY__/, key); print }' \
            config.template.js > config.js
          echo "Wrote config.js ($(wc -c < config.js) bytes)"

      - name: Read manifest version
        id: manifest
        run: |
          version=$(node -p "require('./manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stage extension files
        run: |
          rm -rf dist
          mkdir -p "dist/factorcap"
          cp manifest.json background.js content.js content.css config.js \
             "dist/factorcap/"
          cp -r icons "dist/factorcap/"
          ls -la "dist/factorcap"

      - name: Verify build has no placeholder left behind
        run: |
          if grep -R "__GOOGLE_FACT_CHECK_API_KEY__" "dist/factorcap"; then
            echo "::error::Placeholder leaked into build output."
            exit 1
          fi

      - name: Zip extension
        run: |
          cd dist
          zip -r "factorcap-${{ steps.manifest.outputs.version }}.zip" factorcap

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: factorcap-${{ steps.manifest.outputs.version }}
          path: dist/factorcap-${{ steps.manifest.outputs.version }}.zip
          if-no-files-found: error

      - name: Publish GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/factorcap-${{ steps.manifest.outputs.version }}.zip
          generate_release_notes: true

name: Build extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: npm ci

      - name: ESLint (FactOrCap sources)
        run: npm run lint

  build:
    name: Bundle FactOrCap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Inject API keys into config.js
        env:
          FCT_KEY: ${{ secrets.GOOGLE_FACT_CHECK_API_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Version tags must ship a real Fact Check API key.
          if [ -z "$FCT_KEY" ] && [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "::error::GOOGLE_FACT_CHECK_API_KEY is required to build a release tag."
            exit 1
          fi
          # Fork PRs and repos without secrets: use a CI-only placeholder so the
          # bundle and placeholder checks still run (artifact is non-functional).
          if [ -z "$FCT_KEY" ]; then
            echo "::warning::GOOGLE_FACT_CHECK_API_KEY is not set; using a CI placeholder (set the secret for real builds)."
            FCT_KEY="CI_PLACEHOLDER_SET_GOOGLE_FACT_CHECK_API_KEY_SECRET"
          fi
          # GEMINI_API_KEY is optional: if missing, the AI fallback is
          # simply disabled in the built extension. Substitute an empty
          # string in that case so the placeholder doesn't ship.
          GEMINI_VALUE="${GEMINI_KEY:-}"
          if [ -z "$GEMINI_VALUE" ]; then
            echo "::warning::GEMINI_API_KEY secret is not set; AI fallback will be disabled in this build."
          fi
          # awk treats every character literally, so values with sed
          # special chars (none expected, but be safe) won't break.
          awk -v fct="$FCT_KEY" -v gem="$GEMINI_VALUE" '
            { gsub(/__GOOGLE_FACT_CHECK_API_KEY__/, fct);
              gsub(/__GEMINI_API_KEY__/, gem);
              print }
          ' config.template.js > config.js
          echo "Wrote config.js ($(wc -c < config.js) bytes)"

      - name: Read manifest version
        id: manifest
        run: |
          version=$(node -p "require('./manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stage extension files
        run: |
          rm -rf dist
          mkdir -p "dist/factorcap"
          cp manifest.json background.js content.js content.css config.js \
             "dist/factorcap/"
          cp -r icons "dist/factorcap/"
          ls -la "dist/factorcap"

      - name: Verify build has no placeholder left behind
        run: |
          if grep -E "__GOOGLE_FACT_CHECK_API_KEY__|__GEMINI_API_KEY__" "dist/factorcap/config.js"; then
            echo "::error::Placeholder leaked into build output."
            exit 1
          fi

      - name: Zip extension
        run: |
          cd dist
          zip -r "factorcap-${{ steps.manifest.outputs.version }}.zip" factorcap

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: factorcap-${{ steps.manifest.outputs.version }}
          path: dist/factorcap-${{ steps.manifest.outputs.version }}.zip
          if-no-files-found: error

      - name: Publish GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/factorcap-${{ steps.manifest.outputs.version }}.zip
          generate_release_notes: true
